name: RealESRGANx4plus_finetune
model_type: RealESRNetModel
scale: 4
num_gpu: 1
manual_seed: 123

datasets:
  train:
    name: mydataset
    type: PairedImageDataset
    dataroot_gt: /kaggle/input/realimages/gt
    dataroot_lq: /kaggle/input/combinedsr/lq
    io_backend:
      type: disk
    gt_size: 256
    use_flip: true
    use_rot: true
    scale: 4
    dataset_enlarge_ratio: 1

  val:
    name: val
    type: PairedImageDataset
    dataroot_gt: /kaggle/input/realimages/gt
    dataroot_lq: /kaggle/input/combinedsr/lq
    io_backend:
      type: disk

network_g:
  type: RRDBNet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 23
  num_grow_ch: 32
  scale: 4

path:
  pretrain_network_g: experiments/pretrained_models/RealESRGAN_x4plus.pth
  strict_load_g: true
  resume_state: ~

train:
  optim_g:
    type: Adam
    lr: 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [50000, 100000, 200000]
    gamma: 0.5

  total_iter: 300000
  warmup_iter: -1
  val_freq: 5000

  pixel_opt:
    type: L1Loss
    loss_weight: 1.0